<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geography Game</title>
    <style>
        /* Basic styles for the game */
        body { font-family: Arial, sans-serif; }
        #map { width: 100%; height: 600px; position: relative; }
        .country { position: absolute; cursor: pointer; }
        .island { background: rgba(255, 255, 0, 0.5); }
    </style>
</head>
<body>
    <h1>Geography Game</h1>
    <div id="map">
        <!-- Add countries and their respective click detection -->
        <div class="country" id="france" onclick="detectClick('France')"></div>
        <div class="country" id="french-guiana" onclick="detectClick('French Guiana')"></div>
        <!-- Add other countries here with appropriate click detection -->
    </div>
    <div id="scoreboard">Score: <span id="score">0</span></div>
    <button id="startButton" onclick="startGame()">Start Game</button>
    <div id="timer">Time left: <span id="time">60</span></div>
    <script>
        let score = 0;
        let timeLeft = 60;
        let timer; // Timer variable

        function startGame() {
            score = 0;
            timeLeft = 60;
            document.getElementById('score').innerText = score;
            document.getElementById('time').innerText = timeLeft;
            timer = setInterval(updateTimer, 1000);
        }

        function detectClick(countryName) {
            // Logic to check if the country clicked is valid
            score += 1; // Increment score for correct guess
            document.getElementById('score').innerText = score;
            if (score >= 196) {
                clearInterval(timer);
                triggerConfetti();
                alert('You won!');
            }
        }

        function updateTimer() {
            timeLeft -= 1;
            document.getElementById('time').innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                alert('Time is up! Your score: ' + score);
            }
        }

        function triggerConfetti() {
            // Function to trigger confetti animation
            // Add confetti animation logic here
        }
    </script>
</body>
</html>
