<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geography Game</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #map { width: 100%; height: 600px; background: url('high-res-map.png') no-repeat center center; background-size: cover; position: relative; }
        .island { opacity: 0.7; position: absolute; }
        .dot { width: 10px; height: 10px; background: red; border-radius: 50%; position: absolute; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Geography Game</h1>
    <div id="map">
        <div class="island" style="top: 10%; left: 20%; width: 25px; height: 25px;">French Guiana</div>
        <div class="dot" style="top: 20%; left: 30%;"></div>
        <div class="dot" style="top: 40%; left: 50%;"></div>
    </div>
    <script>
        const dots = document.querySelectorAll('.dot');
        dots.forEach(dot => {
            dot.addEventListener('click', () => {
                alert('Dot clicked!');
            });
        });
    </script>
</body>
</html>
